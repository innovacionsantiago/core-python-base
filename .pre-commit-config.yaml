---
# core-python-base · pre-commit canónico (ADR-018)
# Source of truth: /srv/projects/core/core-python-base/.pre-commit-config.yaml
# Cuando modifiques este archivo, propagá a los proyectos consumidores
# o agendá un agent para que lo haga.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy en modo gradual — projects nuevos pueden activar strict
  # comentar este bloque si tu proyecto aún no tiene mypy configurado
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - sqlmodel
          - types-requests
        args: [--ignore-missing-imports]
